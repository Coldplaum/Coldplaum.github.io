<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的个人网站</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <h1>你好，我是你的名字</h1>
    <p>这里是我的个人网站</p>
    <a href="#about" class="btn">了解我</a>
  </header>

  <main>
    <section id="about" class="section">
      <h2>关于我</h2>
      <p>
        这里写你的简介，比如你的专业、经历、擅长的方向、你现在在做什么。
      </p>
    </section>

    <section id="projects" class="section">
      <h2>项目 / 作品</h2>
      <div class="card">
        <h3>项目 1</h3>
        <p>这里写项目简介。</p>
      </div>
      <div class="card">
        <h3>项目 2</h3>
        <p>这里写项目简介。</p>
      </div>
    </section>

    <section id="contact" class="section">
      <h2>联系方式</h2>
      <p>Email：your@email.com</p>
      <p>Instagram / LinkedIn / 微信都可以放</p>
    </section>
  </main>
</body>
</html>
